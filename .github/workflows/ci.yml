name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Test (core)
        run: bun test
        working-directory: packages/core

      - name: Test (render)
        run: bun test
        working-directory: packages/render

      - name: Build
        run: bun run build
